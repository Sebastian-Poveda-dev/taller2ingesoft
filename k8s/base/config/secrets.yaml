# ⚠️  DEV credentials only – replace values with real secrets in stage/master
# All values are base64-encoded. Generate with: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: circleguard-secrets
type: Opaque
data:
  # PostgreSQL
  db-username:         YWRtaW4=        # admin
  db-password:         cGFzc3dvcmQ=    # password

  # Neo4j  (format: "user/password" as expected by NEO4J_AUTH)
  neo4j-auth:          bmVvNGovUGFzc3dvcmQ=   # neo4j/Password  ← change in prod

  # Neo4j password alone (for Spring property spring.neo4j.authentication.password)
  neo4j-password:      cGFzc3dvcmQ=    # password

  # JWT signing key
  jwt-secret:          bXktc3VwZXItc2VjcmV0LWRldi1rZXktMzItY2hhcnMtbG9uZy0xMjM0NTY3OA==

  # QR token signing key
  qr-secret:           bXktcXItc2VjcmV0LWtleS1mb3ItZGV2LTEyMzQ1Njc4OTA=

  # Identity vault encryption key (hex string)
  vault-secret:        NzQ2NTczNzQyZDczNjU2MzcyNjU3NDJkMzMzMjJkNjM2ODYxNzI3MzJkNmM2ZjZlNjcyZDMxMzIzMzM0MzUzNg==

  # Identity vault salts
  vault-salt:          ZGVhZGJlZWY=    # deadbeef
  vault-hash-salt:     MTIzNDU2Nzg=    # 12345678

  # OpenLDAP admin password
  ldap-admin-password: YWRtaW4=        # admin
