# Dev: single replica, minimal resources to save local machine resources
- op: replace
  path: /spec/replicas
  value: 1

- op: replace
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "384Mi"
      cpu: "300m"
